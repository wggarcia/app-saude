name: app_saude
description: App de monitoramento de saúde em tempo real

publish_to: 'none'

version: 1.0.0+5

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🌐 API
  http: ^1.2.1

  # 📍 LOCALIZAÇÃO
  geolocator: ^10.1.0
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^17.2.2

  # 🗺️ MAPA
  google_maps_flutter: ^2.6.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
