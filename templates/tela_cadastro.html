from django.http import HttpResponse

def tela_cadastro(request):
    return HttpResponse("""
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Solus CRT Saúde • Criar Conta</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  height:100vh;
  background:#020617;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* 🔥 FUNDO */
.bg{
  position:absolute;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 20%, rgba(56,189,248,0.15), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(99,102,241,0.15), transparent 40%),
    #020617;
}

/* 🔥 CARD */
.card{
  position:relative;
  z-index:2;
  width:420px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(25px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 20px 80px rgba(0,0,0,0.7);
}

/* LOGO */
.logo{
  font-size:22px;
  font-weight:600;
  margin-bottom:20px;
}
.logo span{color:#38bdf8}

/* TITULO */
h2{
  font-size:20px;
  margin-bottom:5px;
}

p{
  font-size:13px;
  color:#94a3b8;
  margin-bottom:25px;
}

/* INPUT */
.input{
  width:100%;
  padding:14px;
  margin-bottom:14px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);
  color:white;
  outline:none;
  transition:0.3s;
}

.input:focus{
  border-color:#38bdf8;
  box-shadow:0 0 10px rgba(56,189,248,0.3);
}

/* BOTÃO */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#38bdf8,#2563eb);
  font-weight:600;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(56,189,248,0.4);
}

/* LOADING */
.loading{
  display:none;
  text-align:center;
  margin-top:10px;
  font-size:13px;
  color:#38bdf8;
}

/* ERRO */
.erro{
  margin-top:10px;
  color:#f87171;
  display:none;
  font-size:13px;
}

/* FOOTER */
.footer{
  margin-top:20px;
  text-align:center;
  font-size:13px;
  color:#94a3b8;
  cursor:pointer;
}

.footer:hover{
  color:#38bdf8;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

  <div class="logo">Solus <span>CRT</span> Saúde</div>

  <h2>Criar Conta</h2>
  <p>Ative inteligência epidemiológica em minutos</p>

  <input id="nome" class="input" placeholder="Nome da empresa">
  <input id="email" class="input" placeholder="Email corporativo">
  <input id="senha" type="password" class="input" placeholder="Senha segura">

  <button class="btn" onclick="cadastrar()">Criar Conta</button>

  <div id="loading" class="loading">Criando conta...</div>
  <div id="erro" class="erro"></div>

  <div class="footer" onclick="window.location.href='/'">
    Já tenho conta
  </div>

</div>

<script>
async function cadastrar(){

  const nome = document.getElementById("nome").value;
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;
  const erro = document.getElementById("erro");
  const loading = document.getElementById("loading");

  erro.style.display = "none";

  // 🔥 VALIDAÇÃO PROFISSIONAL
  if(!nome || !email || !senha){
    erro.innerText = "Preencha todos os campos";
    erro.style.display = "block";
    return;
  }

  if(senha.length < 6){
    erro.innerText = "Senha deve ter no mínimo 6 caracteres";
    erro.style.display = "block";
    return;
  }

  loading.style.display = "block";

  try{
    const res = await fetch("/api/registrar_empresa", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ nome, email, senha })
    });

    const data = await res.json();

    loading.style.display = "none";

    if(data.token){
      localStorage.setItem("token", data.token);

      // 🔥 FLUXO PROFISSIONAL
      window.location.href = "/pagamento/";
    }else{
      erro.innerText = data.erro || "Erro ao criar conta";
      erro.style.display = "block";
    }

  }catch(e){
    loading.style.display = "none";
    erro.innerText = "Erro de conexão";
    erro.style.display = "block";
  }
}
</script>

</body>
</html>
""", content_type="text/html")
