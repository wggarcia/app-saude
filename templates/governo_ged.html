<!DOCTYPE html>
<html lang="pt-BR">
<head>
{% include "_favicon.html" %}

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gestão Eletrônica de Documentos</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#041018;--surface:#072030;--surface2:#0a2d45;--accent:#00c2ff;--accent2:#00e5b0;--danger:#ff4d6d;--warn:#ffb347;--ok:#00e5b0;--text:#e8f4ff;--muted:#7a9bb5;--radius:12px;--card:rgba(255,255,255,.04);--border:rgba(255,255,255,.07)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Manrope,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
.sidebar{width:240px;min-height:100vh;height:100vh;overflow-y:auto;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;flex-shrink:0;position:sticky;top:0}
.logo{padding:0 20px 24px;font-size:18px;font-weight:800;color:var(--accent);border-bottom:1px solid var(--border);margin-bottom:12px}
.nav-section{padding:8px 12px 4px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase}
.nav-link{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;border-radius:8px;margin:2px 8px;transition:.15s}
.nav-link:hover,.nav-link.active{background:rgba(0,194,255,.1);color:var(--accent)}
.nav-link span{font-size:16px}
.sidebar-footer{margin-top:auto;padding-top:12px;border-top:1px solid var(--border)}
.nav-link-logout{background:rgba(255,77,109,.12);color:var(--danger);border:1px solid rgba(255,77,109,.35)}
.nav-link-logout:hover{background:rgba(255,77,109,.2)}
.main{flex:1;overflow:auto;padding:28px 32px;display:flex;flex-direction:column;gap:24px}
.page-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.page-title{font-size:22px;font-weight:800}
.page-sub{font-size:13px;color:var(--muted);margin-top:2px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.card-title{font-size:14px;font-weight:700}
.filters{display:flex;gap:10px;padding:16px 20px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.filters input,.filters select{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:Manrope,sans-serif}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:rgba(255,255,255,.02)}
td{padding:12px 16px;font-size:13px;border-top:1px solid var(--border)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-info{background:rgba(0,194,255,.12);color:var(--accent)}
.badge-warn{background:rgba(255,179,71,.12);color:var(--warn)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s;font-family:Manrope,sans-serif}
.btn-primary{background:var(--accent);color:#041018}.btn-primary:hover{opacity:.85}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{background:rgba(255,255,255,.1)}
.btn-danger{background:rgba(255,77,109,.15);color:var(--danger);border:1px solid rgba(255,77,109,.3)}
.btn-sm{padding:5px 10px;font-size:11px}
.empty{padding:40px;text-align:center;color:var(--muted);font-size:14px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;min-width:440px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-group label{font-size:12px;font-weight:600;color:var(--muted)}
.form-group input,.form-group select,.form-group textarea{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:Manrope,sans-serif;outline:none}
.form-group select option{background:#072030}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
</style>
</head>
<body>
{% include "_governo_sidebar.html" %}

<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title">Gestão Eletrônica de Documentos</div>
      <div class="page-sub">Arquivamento digital com metadados, busca e vínculo a processo/paciente</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="abrirModalUpload()">+ Novo Documento</button>
      <a href="/governo/gestao/" class="btn btn-ghost">← Gestão</a>
    </div>
  </div>

  <div class="card">
    <div class="filters">
      <input id="fBusca" placeholder="Buscar por título, tag, paciente, processo…" style="flex:1;min-width:220px" onkeyup="if(event.key==='Enter')carregarDocumentos()">
      <select id="fCategoria" onchange="carregarDocumentos()">
        <option value="">Todas as categorias</option>
        <option value="prontuario">Prontuário</option>
        <option value="administrativo">Administrativo</option>
        <option value="contrato">Contrato</option>
        <option value="oficio">Ofício</option>
        <option value="laudo">Laudo</option>
        <option value="licitacao">Licitação</option>
        <option value="outro">Outro</option>
      </select>
      <button class="btn btn-ghost" onclick="carregarDocumentos()">Buscar</button>
    </div>
    <table>
      <thead>
        <tr><th>Título</th><th>Categoria</th><th>Paciente/Processo</th><th>Tamanho</th><th>Criado em</th><th>Ações</th></tr>
      </thead>
      <tbody id="tbodyDocs"><tr><td colspan="6" class="empty">Carregando…</td></tr></tbody>
    </table>
  </div>
</main>

<!-- Modal: Upload -->
<div class="modal-bg" id="modalUpload">
  <div class="modal">
    <h3>Novo Documento</h3>
    <form id="formUpload" enctype="multipart/form-data">
      <div class="form-group"><label>Título *</label><input id="uTitulo" required></div>
      <div class="form-row">
        <div class="form-group"><label>Categoria</label>
          <select id="uCategoria">
            <option value="outro">Outro</option>
            <option value="prontuario">Prontuário</option>
            <option value="administrativo">Administrativo</option>
            <option value="contrato">Contrato</option>
            <option value="oficio">Ofício</option>
            <option value="laudo">Laudo</option>
            <option value="licitacao">Licitação</option>
          </select>
        </div>
        <div class="form-group"><label>Nº do Processo</label><input id="uProcesso"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Paciente (opcional)</label><input id="uPaciente"></div>
        <div class="form-group"><label>CPF (opcional)</label><input id="uCpf" maxlength="11"></div>
      </div>
      <div class="form-group"><label>Tags (separadas por vírgula)</label><input id="uTags"></div>
      <div class="form-group"><label>Descrição</label><textarea id="uDescricao" rows="2"></textarea></div>
      <div class="form-group"><label>Arquivo *</label><input type="file" id="uArquivo" required></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="fecharModalUpload()">Cancelar</button>
        <button type="submit" class="btn btn-primary">Enviar</button>
      </div>
    </form>
  </div>
</div>

<script>
const E = sessionStorage.getItem("empresa_id") || localStorage.getItem("empresa_id") || "";

function csrfToken() {
  const m = document.cookie.match(/csrftoken=([^;]+)/);
  return m ? m[1] : "";
}

async function fetchJSON(url, opts = {}) {
  const headers = { "X-CSRFToken": csrfToken(), "X-Empresa-ID": E, ...opts.headers };
  if (!(opts.body instanceof FormData)) headers["Content-Type"] = "application/json";
  const res = await fetch(url, { headers, credentials: "include", ...opts });
  return res.json();
}

function fmtBytes(n) {
  if (!n) return "—";
  if (n < 1024) return n + " B";
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
  return (n / (1024 * 1024)).toFixed(1) + " MB";
}

async function carregarDocumentos() {
  const params = new URLSearchParams();
  const q = document.getElementById("fBusca").value;
  const categoria = document.getElementById("fCategoria").value;
  if (q) params.set("q", q);
  if (categoria) params.set("categoria", categoria);
  const d = await fetchJSON("/api/governo/ged/documentos/?" + params.toString());
  const tbody = document.getElementById("tbodyDocs");
  if (!d.documentos || !d.documentos.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">Nenhum documento encontrado.</td></tr>'; return; }
  tbody.innerHTML = d.documentos.map(doc => `<tr>
    <td><strong>${doc.titulo}</strong>${doc.confidencial ? ' <span class="badge badge-warn">Confidencial</span>' : ''}</td>
    <td><span class="badge badge-info">${doc.categoria_display}</span></td>
    <td>${doc.paciente_nome || doc.numero_processo || '—'}</td>
    <td>${fmtBytes(doc.tamanho_bytes)}</td>
    <td>${new Date(doc.criado_em).toLocaleString('pt-BR')}</td>
    <td>
      <button class="btn btn-ghost btn-sm" onclick="abrirDocumento(${doc.id})">Abrir</button>
      <button class="btn btn-danger btn-sm" onclick="excluirDocumento(${doc.id})">Excluir</button>
    </td>
  </tr>`).join("");
}

async function abrirDocumento(id) {
  const d = await fetchJSON(`/api/governo/ged/documentos/${id}/`);
  if (d.url) window.open(d.url, "_blank");
  else alert("Arquivo não disponível.");
}

async function excluirDocumento(id) {
  if (!confirm("Excluir este documento? Esta ação não pode ser desfeita.")) return;
  await fetch(`/api/governo/ged/documentos/${id}/`, {
    method: "DELETE", headers: { "X-CSRFToken": csrfToken(), "X-Empresa-ID": E }, credentials: "include"
  });
  carregarDocumentos();
}

function abrirModalUpload() { document.getElementById("modalUpload").classList.add("open"); }
function fecharModalUpload() { document.getElementById("modalUpload").classList.remove("open"); }

document.getElementById("formUpload").addEventListener("submit", async (e) => {
  e.preventDefault();
  const fd = new FormData();
  fd.append("titulo", document.getElementById("uTitulo").value);
  fd.append("categoria", document.getElementById("uCategoria").value);
  fd.append("numero_processo", document.getElementById("uProcesso").value);
  fd.append("paciente_nome", document.getElementById("uPaciente").value);
  fd.append("paciente_cpf", document.getElementById("uCpf").value);
  fd.append("tags", document.getElementById("uTags").value);
  fd.append("descricao", document.getElementById("uDescricao").value);
  fd.append("arquivo", document.getElementById("uArquivo").files[0]);

  const r = await fetchJSON("/api/governo/ged/documentos/", { method: "POST", body: fd });
  if (r.erro) { alert(r.erro); return; }
  fecharModalUpload();
  document.getElementById("formUpload").reset();
  carregarDocumentos();
});

carregarDocumentos();
</script>
</body>
</html>
