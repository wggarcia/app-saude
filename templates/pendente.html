<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pagamento em processamento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .box {
      background: rgba(255,255,255,0.08);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      width: 360px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
      margin: 20px auto;
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,255,0.2);
      border-top: 5px solid #00e676;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    h2 {
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
      background: linear-gradient(135deg, #00c853, #00e676);
      cursor: pointer;
      font-size: 16px;
    }

    .secondary {
      margin-top: 10px;
      background: #555;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Processando pagamento ⏳</h2>

    <div class="spinner"></div>

    <p>
      Estamos aguardando a confirmação do seu PIX.  
      Isso pode levar alguns segundos.
    </p>

    <button onclick="irParaSistema()">
      Já paguei, entrar no sistema
    </button>

    <button class="secondary" onclick="voltar()">
      Voltar
    </button>
  </div>

  <script>
    function irParaSistema() {
      window.location.href = "/dashboard/";
    }

    function voltar() {
      window.location.href = "/";
    }

    // 🔥 AUTO REFRESH (PROFISSIONAL)
    setInterval(() => {
      window.location.reload();
    }, 5000);
  </script>

</body>
</html>
