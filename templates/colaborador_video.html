<!DOCTYPE html>
<html lang="pt-br">
<head>
{% include "_favicon.html" %}

<meta charset="UTF-8">
<title>{{ sessao_titulo }} · SolusCRT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#041018;color:#e8f4f1;font-family:'Manrope',sans-serif;overflow:hidden}
.shell{display:flex;flex-direction:column;height:100vh}
.header{background:#071c28;border-bottom:1px solid rgba(126,225,195,.12);padding:0 16px;height:50px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.header-icon{font-size:1.1rem}
.header-title{font-size:.88rem;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header-sub{font-size:.65rem;color:#7a9fa0}
.btn-fechar{padding:6px 13px;border-radius:8px;border:1px solid rgba(248,113,113,.3);background:rgba(248,113,113,.1);color:#f87171;font-size:.75rem;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;display:flex;align-items:center;gap:4px}
#jitsi-container{flex:1;width:100%}
#jitsi-container iframe{width:100%;height:100%;border:none}
.loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#7a9fa0}
.spin{width:36px;height:36px;border:3px solid rgba(126,225,195,.15);border-top-color:#00c9a7;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="shell">
  <header class="header">
    <span class="header-icon">📹</span>
    <div>
      <div class="header-title">{{ sessao_titulo }}</div>
      <div class="header-sub">{{ empresa_nome }}</div>
    </div>
    <a class="btn-fechar" href="/colaborador/c/{{ codigo }}/">✕ Sair</a>
  </header>
  <div id="loading" class="loading">
    <div class="spin"></div>
    <span style="font-size:.82rem">Conectando à reunião…</span>
  </div>
  <div id="jitsi-container" style="display:none"></div>
</div>

<script src="https://meet.jit.si/external_api.js"></script>
<script>
const SALA = "{{ sala_jitsi }}";
const EMPRESA = "{{ empresa_nome }}";

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("loading").style.display = "none";
  document.getElementById("jitsi-container").style.display = "flex";

  const api = new JitsiMeetExternalAPI("meet.jit.si", {
    roomName: "soluscrt-" + SALA,
    parentNode: document.getElementById("jitsi-container"),
    width: "100%",
    height: "100%",
    configOverwrite: {
      startWithAudioMuted: false,
      startWithVideoMuted: false,
      prejoinPageEnabled: false,
      disableDeepLinking: true,
    },
    interfaceConfigOverwrite: {
      TOOLBAR_BUTTONS: ["microphone","camera","hangup","chat","tileview"],
      SHOW_JITSI_WATERMARK: false,
      SHOW_BRAND_WATERMARK: false,
      MOBILE_APP_PROMO: false,
    },
    userInfo: { displayName: "Colaborador" }
  });

  api.addEventListener("videoConferenceLeft", () => {
    window.location.href = "/colaborador/c/{{ codigo }}/";
  });
});
</script>
</body>
</html>
