<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Assinar Plano</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 380px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(14px);
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      color: white;
      text-align: center;
    }

    .title {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .price {
      color: #00ffcc;
      font-size: 20px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
      font-size: 16px;
      background: linear-gradient(135deg, #00c853, #00e676);
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 5px 20px rgba(0,255,150,0.5);
    }
  </style>
</head>

<body>

<div class="container">

  <div class="title">Plano Premium</div>
  <div class="price">R$ 29,90 / mês</div>

  <button onclick="pagar()">Ativar Assinatura 🚀</button>

</div>

<script>
async function pagar() {

 const empresaId = localStorage.getItem("empresa_id");

  try {
    const res = await fetch(`/api/assinatura/${empresaId}/`, {
      method: "POST"
    });

    const data = await res.json();

    console.log(data);

    if (data.init_point) {
      window.location.href = data.init_point;
    } else {
      alert("Erro ao gerar pagamento");
    }

  } catch (e) {
    console.error(e);
    alert("Erro ao conectar com servidor");
  }
}
</script>

</body>
</html>
