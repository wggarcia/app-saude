<style id="sst-unified-theme">
:root{
  --sst-bg:#041018;
  --sst-panel:#071c28;
  --sst-line:rgba(126,225,195,.12);
  --sst-line-strong:rgba(126,225,195,.24);
  --sst-text:#e8f4f1;
  --sst-muted:#7fa2b1;
  --sst-teal:#00c9a7;
  --sst-blue:#52a6ff;
}
html,body{
  background:radial-gradient(circle at top left,#0d3247 0,#041018 44%) !important;
  color:var(--sst-text) !important;
  font-family:'Manrope',system-ui,sans-serif !important;
}
.topbar{
  position:fixed !important;
  inset:0 0 auto 0 !important;
  z-index:100 !important;
  display:flex !important;
  align-items:center !important;
  gap:0 !important;
  padding:0 !important;
  height:56px !important;
  background:rgba(4,16,24,.94) !important;
  border-bottom:1px solid var(--sst-line) !important;
  backdrop-filter:blur(18px) !important;
}
.tb-logo{
  display:flex !important;
  align-items:center !important;
  gap:10px !important;
  flex:0 0 220px !important;
  width:220px !important;
  min-width:220px !important;
  height:56px !important;
  padding:0 18px !important;
  border-right:1px solid var(--sst-line) !important;
  color:var(--sst-text) !important;
  letter-spacing:normal !important;
  text-transform:none !important;
}
.tb-icon{
  display:grid !important;
  place-items:center !important;
  flex:0 0 32px !important;
  width:32px !important;
  height:32px !important;
  border-radius:8px !important;
  background:linear-gradient(135deg,var(--sst-teal),var(--sst-blue)) !important;
  color:#041018 !important;
  font-size:.8rem !important;
  font-weight:900 !important;
  line-height:1 !important;
  letter-spacing:0 !important;
  text-transform:uppercase !important;
}
.tb-nome{
  font-size:.82rem !important;
  font-weight:800 !important;
  color:var(--sst-text) !important;
  letter-spacing:.01em;
  line-height:1.1 !important;
  text-transform:none !important;
}
.tb-sub{
  font-size:.62rem !important;
  color:var(--sst-muted) !important;
  line-height:1.25 !important;
  margin-top:2px !important;
  max-width:150px !important;
  overflow:hidden !important;
  text-overflow:ellipsis !important;
  text-transform:none !important;
  white-space:nowrap !important;
}
.tb-nav{
  display:flex !important;
  align-items:center !important;
  gap:2px !important;
  flex:1 1 auto !important;
  min-width:0 !important;
  margin:0 !important;
  padding:0 14px !important;
  overflow-x:auto !important;
  overflow-y:hidden !important;
  white-space:nowrap !important;
}
.tb-nav::-webkit-scrollbar{
  display:none !important;
}
.tb-nav a{
  display:inline-flex !important;
  align-items:center !important;
  flex:0 0 auto !important;
  padding:6px 11px !important;
  font-size:.74rem !important;
  font-weight:700 !important;
  color:var(--sst-muted) !important;
  border-radius:7px !important;
  line-height:1 !important;
  text-decoration:none !important;
  white-space:nowrap !important;
  text-transform:none !important;
}
.tb-nav a:hover{
  color:var(--sst-text) !important;
  background:rgba(255,255,255,.05) !important;
}
.tb-nav a.active{
  color:var(--sst-teal) !important;
  background:rgba(0,201,167,.1) !important;
}
.tb-empresa{
  color:var(--sst-muted) !important;
}
.tb-empresa strong{
  color:var(--sst-text) !important;
}
.tb-actions{
  display:flex !important;
  align-items:center !important;
  gap:8px !important;
  flex:0 0 auto !important;
  margin-left:auto !important;
  padding:0 14px !important;
  white-space:nowrap !important;
}
.tb-actions a,
.tb-actions button{
  text-decoration:none !important;
  white-space:nowrap !important;
}
.btn-main{
  display:inline-flex !important;
  align-items:center !important;
  justify-content:center !important;
  min-height:31px !important;
  padding:7px 14px !important;
  border-radius:8px !important;
  border:none !important;
  background:linear-gradient(135deg,var(--sst-teal),var(--sst-blue)) !important;
  color:#041018 !important;
  font:800 .74rem/1 'Manrope',system-ui,sans-serif !important;
  text-decoration:none !important;
}
.btn-ghost{
  display:inline-flex !important;
  align-items:center !important;
  justify-content:center !important;
  min-height:31px !important;
  padding:7px 12px !important;
  border-radius:8px !important;
  border:1px solid var(--sst-line) !important;
  color:var(--sst-muted) !important;
  background:transparent !important;
  font:700 .74rem/1 'Manrope',system-ui,sans-serif !important;
  text-decoration:none !important;
}
.btn-ghost:hover{
  border-color:var(--sst-line-strong) !important;
  color:var(--sst-text) !important;
}
.app{
  display:block !important;
  padding-top:56px !important;
}
.sidebar,.sst-nav{
  position:fixed !important;
  left:0 !important;
  bottom:0 !important;
  z-index:60 !important;
  display:flex !important;
  flex-direction:column !important;
  width:220px !important;
  top:56px !important;
  padding:10px 0 !important;
  background:rgba(7,28,40,.72) !important;
  border-right:1px solid var(--sst-line) !important;
  overflow-y:auto !important;
}
.sb-label{
  padding:12px 18px 5px !important;
  font-size:.62rem !important;
  font-weight:800 !important;
  letter-spacing:.12em !important;
  line-height:1.2 !important;
  text-transform:uppercase !important;
  color:var(--sst-muted) !important;
}
.sb-link{
  display:flex !important;
  align-items:center !important;
  gap:10px !important;
  padding:8px 18px !important;
  font-size:.78rem !important;
  font-weight:700 !important;
  line-height:1.2 !important;
  color:var(--sst-muted) !important;
  text-decoration:none !important;
  text-transform:none !important;
  border-left:3px solid transparent !important;
  border-left-color:transparent !important;
}
.sb-link:hover{
  color:var(--sst-text) !important;
  background:rgba(255,255,255,.04) !important;
}
.sb-link.active{
  color:var(--sst-teal) !important;
  border-left-color:var(--sst-teal) !important;
  background:rgba(0,201,167,.08) !important;
}
.sb-link.risk-warn{
  box-shadow:inset -2px 0 0 rgba(240,191,107,.28);
}
.sb-link.risk-danger{
  box-shadow:inset -2px 0 0 rgba(248,113,113,.36);
}
.sb-group{
  margin:2px 0 !important;
}
.sb-group-summary{
  list-style:none !important;
  cursor:pointer !important;
  display:flex !important;
  align-items:center !important;
  justify-content:space-between !important;
  padding:0 !important;
}
.sb-group-summary::-webkit-details-marker{
  display:none !important;
}
.sb-group .sb-label{
  width:100% !important;
  display:flex !important;
  align-items:center !important;
  justify-content:space-between !important;
}
.sb-group .sb-label::after{
  content:"▸";
  font-size:.68rem;
  color:var(--sst-muted);
  transition:transform .15s ease;
  margin-left:8px;
}
.sb-group[open] .sb-label::after{
  transform:rotate(90deg);
}
.sb-group-body{
  display:flex !important;
  flex-direction:column !important;
}
.sb-badge{
  margin-left:auto;
  min-width:22px;
  height:18px;
  padding:0 6px;
  border-radius:999px;
  border:1px solid var(--sst-line);
  background:rgba(255,255,255,.05);
  color:var(--sst-muted);
  font-size:.63rem;
  font-weight:800;
  line-height:16px;
  text-align:center;
  display:none;
}
.sb-badge.show{
  display:inline-block;
}
.sb-badge.warn{
  color:#f0bf6b;
  border-color:rgba(240,191,107,.35);
  background:rgba(240,191,107,.12);
}
.sb-badge.danger{
  color:#f87171;
  border-color:rgba(248,113,113,.35);
  background:rgba(248,113,113,.12);
}
.main{
  margin-left:220px !important;
}
.app>main{
  margin-left:220px !important;
}
@media(max-width:860px){
  .sidebar,.sst-nav{display:none !important}
  .main,.app>main{margin-left:0 !important}
  .tb-logo{flex-basis:190px !important;width:190px !important;min-width:190px !important}
  .tb-actions{display:none !important}
}
</style>
<script>
document.addEventListener("DOMContentLoaded", function () {
  {% firstof empresa_nome request.empresa.nome "" as sst_empresa_nome %}
  const nomeCtx = "{{ sst_empresa_nome|escapejs }}".trim();
  const empresa = nomeCtx;
  const subTitulo = empresa ? "SST · " + empresa : "SST · Saúde e Segurança do Trabalho";

  document.querySelectorAll(".tb-nome").forEach((el) => {
    el.textContent = "SolusCRT";
  });
  document.querySelectorAll(".tb-sub").forEach((el) => {
    el.textContent = subTitulo;
  });
  document.querySelectorAll(".tb-empresa").forEach((el) => {
    if (!empresa) return;
    const strong = el.querySelector("strong");
    if (strong) {
      strong.textContent = empresa;
      return;
    }
    el.textContent = "Empresa: " + empresa;
  });
  document.querySelectorAll("#nomeEmpresa").forEach((el) => {
    if (empresa) {
      el.textContent = empresa;
    }
  });

  const GROUP_STATE_KEY = "sst_sidebar_groups_v2";
  function loadGroupState() {
    try { return JSON.parse(localStorage.getItem(GROUP_STATE_KEY) || "{}"); }
    catch (_e) { return {}; }
  }
  function saveGroupState() {
    const state = {};
    document.querySelectorAll(".sb-group").forEach((grp, idx) => {
      const k = grp.getAttribute("data-sst-group-key") || `g${idx}`;
      state[k] = !!grp.open;
    });
    try { localStorage.setItem(GROUP_STATE_KEY, JSON.stringify(state)); } catch (_e) {}
  }
  function setupGroupState() {
    const groups = Array.from(document.querySelectorAll(".sb-group"));
    const saved = loadGroupState();
    let usedSaved = false;
    groups.forEach((grp, idx) => {
      const k = grp.getAttribute("data-sst-group-key") || `g${idx}`;
      if (Object.prototype.hasOwnProperty.call(saved, k)) {
        grp.open = !!saved[k];
        usedSaved = true;
      }
      grp.addEventListener("toggle", saveGroupState);
    });
    if (usedSaved) return;
    let opened = false;
    groups.forEach((grp) => {
      const hasActive = !!grp.querySelector(".sb-link.active");
      grp.open = hasActive;
      if (hasActive) opened = true;
    });
    if (!opened && groups.length) groups[0].open = true;
    saveGroupState();
  }
  setupGroupState();

  // Contexto integrado SST para sincronizar abas e sidebar
  const CTX_KEY = "sst_contexto_integrado_v1";
  const CH_NAME = "sst-contexto-sync";
  const bc = ("BroadcastChannel" in window) ? new BroadcastChannel(CH_NAME) : null;

  function authHeaders() {
    const token = sessionStorage.getItem("auth_token") || sessionStorage.getItem("token") || localStorage.getItem("auth_token") || localStorage.getItem("token") || "";
    return token ? { "Authorization": "Bearer " + token } : {};
  }
  function readContext() {
    try { return JSON.parse(sessionStorage.getItem(CTX_KEY) || "{}"); }
    catch (_e) { return {}; }
  }
  function writeContext(payload) {
    try { sessionStorage.setItem(CTX_KEY, JSON.stringify(payload || {})); } catch (_e) {}
  }
  function pickValueByKey(kpis, keyExpr) {
    if (!kpis || !keyExpr) return 0;
    const keys = String(keyExpr).split("|").map((s) => s.trim()).filter(Boolean);
    for (const k of keys) {
      const v = Number(kpis[k] || 0);
      if (v > 0) return v;
    }
    const fallbackKey = keys[0];
    return Number(kpis[fallbackKey] || 0);
  }
  function applySidebarBadges(ctx) {
    const kpis = (ctx && ctx.kpis) || {};
    document.querySelectorAll("[data-sst-badge]").forEach((el) => {
      const expr = el.getAttribute("data-sst-badge") || "";
      const fmt = (el.getAttribute("data-sst-format") || "").toLowerCase();
      const v = pickValueByKey(kpis, expr);
      const num = Number.isFinite(v) ? v : 0;

      const parent = el.closest(".sb-link");
      if (parent) parent.classList.remove("risk-warn", "risk-danger");

      if (num <= 0) {
        el.textContent = "";
        el.classList.remove("show", "warn", "danger");
        return;
      }

      let text = String(num);
      if (fmt === "pct") text = `${num}%`;
      el.textContent = text;
      el.classList.add("show");
      el.classList.remove("warn", "danger");

      if (num >= 10) el.classList.add("danger");
      else if (num >= 1) el.classList.add("warn");

      if (parent) {
        const sev = (parent.getAttribute("data-sst-severity") || "").toLowerCase();
        if (sev === "critical" && num >= 1) {
          parent.classList.add("risk-danger");
        } else if (sev === "attention" && num >= 1) {
          parent.classList.add("risk-warn");
        } else if (num >= 10) {
          parent.classList.add("risk-danger");
        } else if (num >= 1) {
          parent.classList.add("risk-warn");
        }
      }
    });
  }

  async function refreshContext(options) {
    const force = options && options.force;
    const current = readContext();
    const currentTs = Date.parse((current && current.gerado_em) || "");
    const fresh = currentTs && (Date.now() - currentTs < 2 * 60 * 1000);
    if (!force && fresh) {
      applySidebarBadges(current);
      return current;
    }

    try {
      const res = await fetch("/api/sst/contexto-integrado/", {
        credentials: "same-origin",
        headers: authHeaders(),
      });
      if (!res.ok) throw new Error("Falha ao buscar contexto integrado SST");
      const data = await res.json();
      writeContext(data);
      applySidebarBadges(data);
      if (bc) bc.postMessage({ type: "context-updated", payload: data });
      window.dispatchEvent(new CustomEvent("sst:context-updated", { detail: data }));
      return data;
    } catch (_err) {
      applySidebarBadges(current);
      return current;
    }
  }

  if (bc) {
    bc.onmessage = (ev) => {
      if (ev && ev.data && ev.data.type === "context-updated") {
        const payload = ev.data.payload || {};
        writeContext(payload);
        applySidebarBadges(payload);
        window.dispatchEvent(new CustomEvent("sst:context-updated", { detail: payload }));
      }
    };
  }

  window.SSTContext = {
    get: readContext,
    refresh: refreshContext,
    publish: function (payload) {
      writeContext(payload || {});
      applySidebarBadges(payload || {});
      if (bc) bc.postMessage({ type: "context-updated", payload: payload || {} });
      window.dispatchEvent(new CustomEvent("sst:context-updated", { detail: payload || {} }));
    },
  };

  const nativeFetch = window.fetch ? window.fetch.bind(window) : null;
  if (nativeFetch) {
    window.fetch = async function patchedSstFetch(input, init) {
      const reqUrl = typeof input === "string" ? input : (input && input.url) || "";
      const method = ((init && init.method) || "GET").toUpperCase();
      const isSstMutation = reqUrl.includes("/api/sst/") && ["POST", "PUT", "PATCH", "DELETE"].includes(method);
      const response = await nativeFetch(input, init);
      if (isSstMutation && response && response.ok) {
        setTimeout(function () { refreshContext({ force: true }); }, 180);
      }
      return response;
    };
  }

  applySidebarBadges(readContext());
  refreshContext({ force: false });
  setInterval(function () { refreshContext({ force: false }); }, 120000);
  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "visible") refreshContext({ force: false });
  });
});
</script>
