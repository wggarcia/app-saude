<section class="eps" id="enterprisePremiumSuite">
  <div class="eps-head">
    <div>
      <div class="eps-kicker">Suite Enterprise</div>
      <h2>Operacao premium do ambiente</h2>
      <p id="epsHeadline">Conectando dados reais, automacoes e diferenciais competitivos.</p>
    </div>
    <div class="eps-score">
      <strong id="epsScore">--%</strong>
      <span id="epsStatus">carregando</span>
    </div>
  </div>
  <div class="eps-body">
    <div>
      <div class="eps-process">
        <div class="eps-section-title">Processo guiado</div>
        <div id="epsProcesses" class="eps-process-list">
          <div class="eps-empty">Carregando processos...</div>
        </div>
      </div>
      <div class="eps-section-title" style="margin-top:14px">Capacidades vivas</div>
      <div class="eps-capabilities" id="epsCapabilities">
        <div class="eps-empty">Carregando suite enterprise...</div>
      </div>
    </div>
    <aside class="eps-actions">
      <strong>Proximas automacoes</strong>
      <div id="epsActions" class="eps-action-list"></div>
    </aside>
  </div>
</section>

<style>
.eps{background:linear-gradient(180deg,rgba(0,194,255,.08),rgba(255,255,255,.035));border:1px solid rgba(0,194,255,.18);border-radius:14px;padding:18px;box-shadow:0 18px 60px rgba(0,0,0,.18)}
.eps-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:16px}
.eps-kicker{font-size:10px;font-weight:900;letter-spacing:1.4px;text-transform:uppercase;color:#00e5b0;margin-bottom:5px}
.eps h2{font-size:18px;margin:0 0 6px;color:#e8f4ff}
.eps p{font-size:13px;line-height:1.55;color:#8fb1c9;margin:0;max-width:840px}
.eps-score{min-width:96px;text-align:right}
.eps-score strong{display:block;font-size:30px;line-height:1;color:#00c2ff}
.eps-score span{font-size:11px;font-weight:800;text-transform:uppercase;color:#8fb1c9}
.eps-body{display:grid;grid-template-columns:1fr 290px;gap:14px}
.eps-section-title{font-size:11px;font-weight:900;letter-spacing:.9px;text-transform:uppercase;color:#00e5b0;margin-bottom:9px}
.eps-process{background:rgba(4,16,24,.38);border:1px solid rgba(255,255,255,.075);border-radius:12px;padding:12px;margin-bottom:12px}
.eps-process-list{display:grid;gap:12px}
.eps-flow{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px}
.eps-flow-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}
.eps-flow-head strong{font-size:13px;color:#f3fbff}.eps-flow-head p{font-size:12px;max-width:620px}
.eps-steps{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.eps-step{background:rgba(4,16,24,.74);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px;min-width:0}
.eps-step.feito{border-color:rgba(0,229,176,.35);background:rgba(0,229,176,.055)}
.eps-step-num{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#00e5b0,#00c2ff);color:#041018;font-size:11px;font-weight:950;margin-bottom:8px}
.eps-step.feito .eps-step-num{background:#00e5b0}
.eps-step-title{font-size:12px;font-weight:900;color:#f3fbff;margin-bottom:4px}
.eps-step p{font-size:11px;line-height:1.42;color:#8fb1c9;margin-bottom:9px}
.eps-step-state{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:900;text-transform:uppercase;border-radius:99px;padding:4px 7px;margin-bottom:8px;background:rgba(255,179,71,.14);color:#ffcf8c}
.eps-step-state.feito{background:rgba(0,229,176,.14);color:#00e5b0}
.eps-step button{width:100%;min-height:32px;border:0;border-radius:8px;background:#00c2ff;color:#041018;font-size:11px;font-weight:900;cursor:pointer;font-family:inherit}
.eps-step button:hover{filter:brightness(1.08)}
.eps-capabilities{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.eps-cap{background:rgba(4,16,24,.66);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;min-width:0}
.eps-cap-top{display:flex;justify-content:space-between;gap:10px;margin-bottom:8px;align-items:flex-start}
.eps-cap-title{font-size:13px;font-weight:900;color:#f3fbff}
.eps-badge{font-size:10px;font-weight:900;text-transform:uppercase;border-radius:99px;padding:4px 8px;background:rgba(255,255,255,.08);color:#9ab6ca;white-space:nowrap}
.eps-badge.operacional{background:rgba(0,229,176,.14);color:#00e5b0}
.eps-badge.em_ativacao{background:rgba(255,179,71,.16);color:#ffcf8c}
.eps-badge.sem_dados{background:rgba(255,77,109,.14);color:#ff8aa0}
.eps-progress{height:7px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin:10px 0}
.eps-progress span{display:block;height:100%;background:linear-gradient(90deg,#00e5b0,#00c2ff);border-radius:99px}
.eps-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.eps-chip{font-size:10px;font-weight:800;color:#a9c0d0;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.045);border-radius:99px;padding:4px 7px}
.eps-actions{background:rgba(4,16,24,.66);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;align-self:start}
.eps-actions strong{display:block;font-size:13px;margin-bottom:10px;color:#f3fbff}
.eps-action-list{display:grid;gap:9px}
.eps-action{font-size:12px;line-height:1.45;color:#d7e7f1;border-left:3px solid #00c2ff;background:rgba(255,255,255,.045);border-radius:8px;padding:9px 10px}
.eps-action small{display:block;color:#8fb1c9;margin-top:3px}
.eps-empty{grid-column:1/-1;padding:18px;color:#8fb1c9}
@media(max-width:1100px){.eps-body{grid-template-columns:1fr}.eps-actions{width:100%}.eps-steps{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:760px){.eps-head{flex-direction:column}.eps-score{text-align:left}.eps-capabilities,.eps-steps{grid-template-columns:1fr}}
</style>

<script>
(function(){
  const root = document.getElementById("enterprisePremiumSuite");
  if (!root) return;
  const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[char]));
  function runAction(action, modal) {
    if (action && action.startsWith("link:")) {
      window.location.href = action.slice(5);
      return;
    }
    if (action && action.startsWith("tab:") && typeof window.setTab === "function") {
      window.setTab(action.slice(4));
    }
    if (action && action.startsWith("modal:") && typeof window.openModal === "function") {
      window.openModal(action.slice(6));
      return;
    }
    if (modal && typeof window[modal] === "function") {
      window[modal]();
    }
  }
  function render(payload){
    document.getElementById("epsHeadline").textContent = payload.headline || payload.diferencial || "Suite enterprise ativa.";
    document.getElementById("epsScore").textContent = `${payload.score_suite || 0}%`;
    document.getElementById("epsStatus").textContent = payload.status || "em leitura";
    document.getElementById("epsProcesses").innerHTML = (payload.processos || []).map((processo, processIndex) => `
      <article class="eps-flow">
        <div class="eps-flow-head">
          <div>
            <strong>${escapeHtml(processo.nome)}</strong>
            <p>${escapeHtml(processo.descricao)}</p>
          </div>
        </div>
        <div class="eps-steps">
          ${(processo.etapas || []).map((step, stepIndex) => `
            <div class="eps-step ${escapeHtml(step.status || "pendente")}">
              <div class="eps-step-num">${escapeHtml(step.ordem || stepIndex + 1)}</div>
              <div class="eps-step-state ${escapeHtml(step.status || "pendente")}">${escapeHtml(step.status === "feito" ? "feito" : "pendente")} · ${escapeHtml(step.sinais || 0)} sinais</div>
              <div class="eps-step-title">${escapeHtml(step.titulo)}</div>
              <p>${escapeHtml(step.descricao)}</p>
              <button type="button" data-action="${escapeHtml(step.acao || "")}" data-modal="${escapeHtml(step.modal || "")}">${escapeHtml(step.acao_label || "Executar")}</button>
            </div>
          `).join("")}
        </div>
      </article>
    `).join("") || '<div class="eps-empty">Nenhum processo guiado carregado.</div>';
    document.getElementById("epsCapabilities").innerHTML = (payload.capacidades || []).map((cap) => `
      <article class="eps-cap">
        <div class="eps-cap-top">
          <div class="eps-cap-title">${escapeHtml(cap.nome)}</div>
          <span class="eps-badge ${escapeHtml(cap.status)}">${escapeHtml(cap.status).replace("_"," ")}</span>
        </div>
        <p>${escapeHtml(cap.descricao)}</p>
        <div class="eps-progress"><span style="width:${Math.max(0, Math.min(100, Number(cap.progresso || 0)))}%"></span></div>
        <div class="eps-meta">
          <span class="eps-chip">${escapeHtml(cap.metricas?.atual || 0)} sinais reais</span>
          ${(cap.referencias || []).map((ref) => `<span class="eps-chip">${escapeHtml(ref)}</span>`).join("")}
        </div>
      </article>
    `).join("") || '<div class="eps-empty">Nenhuma capacidade carregada.</div>';
    document.getElementById("epsActions").innerHTML = (payload.proximas_acoes || []).map((item) => `
      <div class="eps-action">${escapeHtml(item.acao)}<small>${escapeHtml(item.capacidade)}</small></div>
    `).join("") || '<div class="eps-action">Sem acao critica agora.<small>Continue alimentando dados reais.</small></div>';
  }
  root.addEventListener("click", (event) => {
    const button = event.target.closest("[data-action]");
    if (!button) return;
    runAction(button.dataset.action || "", button.dataset.modal || "");
  });
  fetch("/api/enterprise/premium-suite")
    .then((res) => res.ok ? res.json() : Promise.reject())
    .then(render)
    .catch(() => {
      document.getElementById("epsCapabilities").innerHTML = '<div class="eps-empty">Nao foi possivel carregar a Suite Enterprise agora.</div>';
    });
}());
</script>
