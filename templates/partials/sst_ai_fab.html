{% if tem_assistente_ia %}
<!-- Assistente IA SST -->
<style>
  #sst-ai-fab {
    position: fixed; bottom: 28px; right: 28px; z-index: 9000;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--primary, #2563EB); color: #fff;
    border: none; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; transition: transform .15s;
  }
  #sst-ai-fab:hover { transform: scale(1.08); }
  #sst-ai-panel {
    position: fixed; bottom: 96px; right: 28px; z-index: 9001;
    width: 360px; max-height: 520px;
    background: #fff; border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,.18);
    display: flex; flex-direction: column;
    overflow: hidden; display: none;
  }
  #sst-ai-panel.open { display: flex; }
  #sst-ai-header {
    background: var(--primary, #2563EB); color: #fff;
    padding: 14px 18px; font-weight: 700; font-size: .95rem;
    display: flex; align-items: center; gap: 8px;
  }
  #sst-ai-header span { flex: 1; }
  #sst-ai-close { background: none; border: none; color: #fff; font-size: 18px; cursor: pointer; }
  #sst-ai-msgs {
    flex: 1; overflow-y: auto; padding: 14px;
    display: flex; flex-direction: column; gap: 10px;
    font-size: .88rem; line-height: 1.5;
  }
  .ai-msg-user {
    align-self: flex-end; background: var(--primary, #2563EB); color: #fff;
    padding: 8px 12px; border-radius: 12px 12px 2px 12px; max-width: 85%;
  }
  .ai-msg-bot {
    align-self: flex-start; background: #F1F5F9; color: #1E293B;
    padding: 8px 12px; border-radius: 12px 12px 12px 2px; max-width: 90%;
    white-space: pre-wrap;
  }
  .ai-msg-bot.loading { color: #94A3B8; font-style: italic; }
  #sst-ai-form {
    display: flex; padding: 10px 12px; gap: 8px;
    border-top: 1px solid #E2E8F0;
  }
  #sst-ai-input {
    flex: 1; border: 1px solid #CBD5E1; border-radius: 8px;
    padding: 8px 10px; font-size: .88rem; outline: none;
    resize: none; height: 38px;
  }
  #sst-ai-input:focus { border-color: var(--primary, #2563EB); }
  #sst-ai-send {
    background: var(--primary, #2563EB); color: #fff;
    border: none; border-radius: 8px; padding: 0 14px;
    cursor: pointer; font-size: 16px;
  }
  #sst-ai-send:disabled { opacity: .5; cursor: default; }
</style>

<button id="sst-ai-fab" title="Assistente IA SST">🤖</button>

<div id="sst-ai-panel">
  <div id="sst-ai-header">
    <span>✦ Assistente SST</span>
    <button id="sst-ai-close">✕</button>
  </div>
  <div id="sst-ai-msgs">
    <div class="ai-msg-bot">Olá! Sou o Assistente SST. Pergunte sobre ASOs, treinamentos, afastamentos, EPIs ou conformidade da empresa.</div>
  </div>
  <form id="sst-ai-form" onsubmit="return false;">
    <input id="sst-ai-input" type="text" placeholder="Digite sua pergunta…" autocomplete="off" maxlength="500" />
    <button id="sst-ai-send" type="submit">➤</button>
  </form>
</div>

<script>
(function() {
  const fab   = document.getElementById('sst-ai-fab');
  const panel = document.getElementById('sst-ai-panel');
  const close = document.getElementById('sst-ai-close');
  const msgs  = document.getElementById('sst-ai-msgs');
  const input = document.getElementById('sst-ai-input');
  const send  = document.getElementById('sst-ai-send');

  fab.addEventListener('click', () => { panel.classList.toggle('open'); if (panel.classList.contains('open')) input.focus(); });
  close.addEventListener('click', () => panel.classList.remove('open'));

  function addMsg(text, role) {
    const div = document.createElement('div');
    div.className = role === 'user' ? 'ai-msg-user' : 'ai-msg-bot';
    div.textContent = text;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  async function enviar() {
    const q = input.value.trim();
    if (!q) return;
    input.value = '';
    send.disabled = true;
    addMsg(q, 'user');
    const loading = addMsg('Analisando…', 'bot');
    loading.classList.add('loading');
    try {
      const r = await fetch('/api/sst/assistente/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': (document.cookie.match(/csrftoken=([^;]+)/) || [])[1] || '' },
        body: JSON.stringify({ pergunta: q }),
      });
      const data = await r.json();
      loading.remove();
      addMsg(data.resposta || data.erro || 'Erro desconhecido.', 'bot');
    } catch (e) {
      loading.remove();
      addMsg('Falha de conexão. Tente novamente.', 'bot');
    } finally {
      send.disabled = false;
      input.focus();
    }
  }

  document.getElementById('sst-ai-form').addEventListener('submit', enviar);
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); } });
})();
</script>
{% endif %}
