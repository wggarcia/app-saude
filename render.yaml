services:
  - type: web
    name: soluscrt-saude-api
    env: python
    plan: starter
    buildCommand: "./build.sh"
    preDeployCommand: "APP_DATABASE_URL= python manage.py migrate --noinput && APP_DATABASE_URL= python manage.py bootstrap_acessos && APP_DATABASE_URL= python manage.py sanear_producao --apply"
    startCommand: "./start.sh"
    healthCheckPath: /api/public/resumo
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_DEBUG
        value: "false"
      - key: JWT_EXP_HOURS
        value: "48"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: app-saude-p9n8.onrender.com,soluscrt.com.br,soluscrtsaude.com.br,empresa.soluscrt.com.br,governo.soluscrt.com.br,admin.soluscrt.com.br,app.soluscrt.com.br,.soluscrt.com.br,.soluscrtsaude.com.br
      - key: CSRF_TRUSTED_ORIGINS
        value: https://app-saude-p9n8.onrender.com,https://soluscrt.com.br,https://soluscrtsaude.com.br,https://empresa.soluscrt.com.br,https://governo.soluscrt.com.br,https://admin.soluscrt.com.br,https://app.soluscrt.com.br
      - key: CORS_ALLOWED_ORIGINS
        value: https://app-saude-p9n8.onrender.com,https://soluscrt.com.br,https://soluscrtsaude.com.br,https://empresa.soluscrt.com.br,https://governo.soluscrt.com.br,https://admin.soluscrt.com.br,https://app.soluscrt.com.br
      - key: PUBLIC_BASE_URL
        value: https://app-saude-p9n8.onrender.com
      - key: PAYMENT_PROVIDER
        value: asaas
      - key: SKIP_BUILD_MIGRATIONS
        value: "true"
      - key: ALLOW_ENTERPRISE_DEMO_MUTATIONS
        value: "false"
      # ── Email transacional da plataforma SaaS ─────────────────────────────
      # Um único remetente (noreply@soluscrt.com.br) envia em nome de TODOS os
      # clientes. Os dados do cliente ficam no conteúdo do email.
      # Configure EMAIL_HOST_USER e EMAIL_HOST_PASSWORD no painel do Render
      # com a conta noreply@soluscrt.com.br do Zoho Mail.
      - key: EMAIL_HOST
        value: smtp.zoho.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "true"
      - key: DEFAULT_FROM_EMAIL
        value: "SolusCRT <noreply@soluscrt.com.br>"
      - key: EMAIL_HOST_USER
        sync: false   # noreply@soluscrt.com.br  (configurar no painel Render)
      - key: EMAIL_HOST_PASSWORD
        sync: false   # senha da conta Zoho acima (configurar no painel Render)
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: soluscrt-saude-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: soluscrt-redis
          type: redis
          property: connectionString
      - key: ASAAS_API_KEY
        sync: false
      - key: ASAAS_BASE_URL
        value: https://api.asaas.com/v3
      - key: ASAAS_WEBHOOK_TOKEN
        sync: false
      - key: ASAAS_USER_AGENT
        value: SolusCRT-Saude/1.0
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: MAPBOX_ACCESS_TOKEN
        sync: false
      - key: GOOGLE_MAPS_BROWSER_KEY
        sync: false
      - key: GOOGLE_MAPS_IOS_KEY
        sync: false
      - key: SOLUSCRT_BOOTSTRAP_EMPRESA_EMAIL
        sync: false
      - key: SOLUSCRT_BOOTSTRAP_EMPRESA_PASSWORD
        sync: false
      - key: SOLUSCRT_BOOTSTRAP_EMPRESA_NOME
        sync: false
      - key: SOLUSCRT_BOOTSTRAP_GOVERNO_EMAIL
        sync: false
      - key: SOLUSCRT_BOOTSTRAP_GOVERNO_PASSWORD
        sync: false
      - key: SOLUSCRT_BOOTSTRAP_GOVERNO_NOME
        sync: false
      - key: SOLUSCRT_BOOTSTRAP_OWNER_EMAIL
        sync: false
      - key: SOLUSCRT_BOOTSTRAP_OWNER_PASSWORD
        sync: false
      - key: SOLUSCRT_BOOTSTRAP_OWNER_NOME
        sync: false
      - key: SOLUSCRT_BOOTSTRAP_RESET_PASSWORDS
        value: "false"

  # ── Alertas SST — cron diário 08:00 BRT (11:00 UTC) ──────────────────────
  - type: cron
    name: sst-alertas-email
    env: python
    plan: starter
    buildCommand: "./build_cron.sh"
    schedule: "0 11 * * *"
    startCommand: "python manage.py sst_alertas_email"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: soluscrt-saude-db
          property: connectionString
      - key: EMAIL_HOST
        value: smtp.zoho.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "true"
      - key: DEFAULT_FROM_EMAIL
        value: "SolusCRT <noreply@soluscrt.com.br>"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: ASAAS_WEBHOOK_TOKEN
        sync: false
      - key: ASAAS_API_KEY
        sync: false

  # ── Trial expiry emails — cron diário 09:00 BRT (12:00 UTC) ─────────────────
  - type: cron
    name: trial-expiry-emails
    env: python
    plan: starter
    buildCommand: "./build_cron.sh"
    schedule: "0 12 * * *"
    startCommand: "python manage.py trial_expiry_emails"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: soluscrt-saude-db
          property: connectionString
      - key: EMAIL_HOST
        value: smtp.zoho.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "true"
      - key: DEFAULT_FROM_EMAIL
        value: "SolusCRT <noreply@soluscrt.com.br>"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: PUBLIC_BASE_URL
        value: https://app-saude-p9n8.onrender.com

  # ── Renovação/dunning de clientes pagantes — diário 09:30 BRT (12:30 UTC) ──
  - type: cron
    name: renovacao-cobranca
    env: python
    plan: starter
    buildCommand: "./build_cron.sh"
    schedule: "30 12 * * *"
    startCommand: "python manage.py renovacao_cobranca"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: soluscrt-saude-db
          property: connectionString
      - key: EMAIL_HOST
        value: smtp.zoho.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "true"
      - key: DEFAULT_FROM_EMAIL
        value: "SolusCRT <noreply@soluscrt.com.br>"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: PUBLIC_BASE_URL
        value: https://app-saude-p9n8.onrender.com

  # ── SLA breach alertas — 2x/dia 08:00 e 14:00 BRT (11:00 e 17:00 UTC) ─────
  - type: cron
    name: sla-breach-alertas
    env: python
    plan: starter
    buildCommand: "./build_cron.sh"
    schedule: "0 11,17 * * *"
    startCommand: "python manage.py sla_breach_alertas"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: soluscrt-saude-db
          property: connectionString
      - key: EMAIL_HOST
        value: smtp.zoho.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "true"
      - key: DEFAULT_FROM_EMAIL
        value: "SolusCRT <noreply@soluscrt.com.br>"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: PUBLIC_BASE_URL
        value: https://app-saude-p9n8.onrender.com

  # ── Redis — cache compartilhado entre workers (rate limiting, sessões) ──────
  - type: redis
    name: soluscrt-redis
    plan: starter
    ipAllowList: []   # só serviços internos do Render acessam

databases:
  - name: soluscrt-saude-db
    plan: starter
